# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
    CODE_PATH: 'jlox/com/craftinginterpreters/lox/*.java'
    TOOL_PATH: 'jlox/com/craftinginterpreters/tool/*.java'
    CODE_DIR: 'jlox/com/craftinginterpreters/lox'
    TOOL_DIR: 'jlox/com/craftinginterpreters/tool'
    OUT_DIR: 'out'
    PACKAGE: 'com.craftinginterpreters.lox.Lox'
    TOOL_PACKAGE: 'com.craftinginterpreters.tool.GenerateAst'
    TEST: 'tests/test.lox'

tasks:
    build:
        sources:
            - '{{.CODE_PATH}}'
        generates:
            - '{{.OUT_DIR}}/**/*.class'
        cmds:
            - javac -d {{.OUT_DIR}} {{.CODE_PATH}}
        silent: true
    
    run:
        cmds:
            - java -cp {{.OUT_DIR}} {{.PACKAGE}}
        silent: true
    
    tool:
        sources:
            - '{{.TOOL_PATH}}'
        generates:
            - '{{.TOOL_PATH}}/**/*.class'
        cmds:
            - javac {{.TOOL_PATH}}
            - java -cp jlox {{.TOOL_PACKAGE}} {{.CODE_DIR}}
        silent: true
    
    clean:
        cmds:
            - rm -rf {{.OUT_DIR}} {{.TOOL_DIR}}/*.class
        silent: true
    
    test:
        deps: [build]
        cmds:
            - java -cp {{.OUT_DIR}} {{.PACKAGE}} {{.TEST}}
        silent: true
    
    default:
        cmds:
            - task: build
            - task: run

